name: 'ecommerce_analytics'
version: '1.0.0'
config-version: 2

profile: 'ecommerce_analytics'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ecommerce_analytics:
    staging:
      +materialized: view          # staging = views (cheap, no storage)
      +dataset: staging
    intermediate:
      +materialized: view
      +dataset: staging
    marts:
      core:
        +materialized: table       # marts = tables (fast queries)
        +dataset: marts
      metrics:
        +materialized: table
        +dataset: metrics

vars:
  start_date: '2022-01-01'
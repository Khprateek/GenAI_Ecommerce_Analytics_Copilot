version: 2

models:

  # ── FACT TABLE ───────────────────────────────────────────────────────────────

  - name: fact_orders
    description: >
      Central order fact table — one row per order with surrogate-key FKs
      to all dimension tables. All monetary measures in INR.
    columns:
      - name: order_sk
        description: "Surrogate key for the fact row"
        tests: [not_null, unique]
      - name: order_id
        description: "Natural order key"
        tests: [not_null, unique]
      - name: customer_sk
        tests: [not_null]
      - name: order_date_key
        tests: [not_null]
      - name: revenue
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
      - name: order_status
        tests:
          - accepted_values:
              values: ['DELIVERED', 'CANCELLED', 'FAILED_DELIVERY']

  # ── DIMENSION: CUSTOMERS ─────────────────────────────────────────────────────

  - name: dim_customers
    description: >
      Customer dimension with RFM segments, value tiers, churn risk,
      delivery experience, and Zepto Pass membership.
    columns:
      - name: customer_sk
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null, unique]
      - name: rfm_segment
        tests:
          - accepted_values:
              values:
                - 'Champions'
                - 'Loyal Customers'
                - 'Potential Loyalists'
                - 'New Customers'
                - 'Need Attention'
                - 'At Risk'
                - 'Hibernating'
                - 'Lost Customers'
                - 'Others'
                - 'No Purchases'
      - name: value_tier
        tests:
          - accepted_values:
              values: ['Platinum', 'Gold', 'Silver', 'Bronze', 'No Purchase']
      - name: churn_risk_tier
        tests:
          - accepted_values:
              values: ['Active', 'Medium Risk', 'High Risk', 'Churned', 'Dormant']

  # ── DIMENSION: PRODUCTS ──────────────────────────────────────────────────────

  - name: dim_products
    description: >
      Product dimension for quick-commerce grocery/essentials catalog
      with margin analysis, substitution/issue quality signals, and
      perishability tiers.
    columns:
      - name: product_sk
        tests: [not_null, unique]
      - name: product_id
        tests: [not_null, unique]
      - name: price_tier
        tests:
          - accepted_values:
              values: ['Premium', 'Mid-Range', 'Value', 'Budget']
      - name: sales_performance
        tests:
          - accepted_values:
              values: ['Star', 'Strong', 'Moderate', 'Slow Mover', 'No Sales']

  # ── DIMENSION: DARK STORES ──────────────────────────────────────────────────

  - name: dim_dark_stores
    description: >
      Dark store / micro-fulfilment center dimension with geography,
      rider fleet, order volume, and delivery performance tiers.
    columns:
      - name: store_sk
        tests: [not_null, unique]
      - name: store_id
        tests: [not_null, unique]
      - name: volume_tier
        tests:
          - accepted_values:
              values: ['High Volume', 'Medium Volume', 'Low Volume', 'Not Operational']

  # ── DIMENSION: DELIVERY PARTNERS ────────────────────────────────────────────

  - name: dim_delivery_partners
    description: >
      Rider / delivery partner dimension with tenure, delivery speed,
      on-time rate, and performance tiers.
    columns:
      - name: rider_sk
        tests: [not_null, unique]
      - name: rider_id
        tests: [not_null, unique]
      - name: performance_tier
        tests:
          - accepted_values:
              values: ['Excellent', 'Good', 'Average', 'Needs Training']

  # ── DIMENSION: DATE ─────────────────────────────────────────────────────────

  - name: dim_date
    description: "Calendar dimension with Indian fiscal year (Apr-Mar) and relative date flags"
    columns:
      - name: date_key
        tests: [not_null, unique]
      - name: full_date
        tests: [not_null, unique]
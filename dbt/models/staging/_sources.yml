version: 2

sources:
  - name: raw
    database: "{{ env_var('GCP_PROJECT_ID', 'genai-copilot-enterprisedata') }}"
    dataset: raw
    description: "Raw quick-commerce data loaded directly from CSVs via Python ingestion script"

    tables:
      - name: dark_stores
        description: "Micro-fulfilment center / dark store locations"
        columns:
          - name: store_id
            description: "Primary key for dark store (e.g. MUM-Andheri)"
            tests: [not_null, unique]

      - name: delivery_partners
        description: "Riders handling quick-commerce deliveries"
        columns:
          - name: rider_id
            description: "Primary key for delivery rider"
            tests: [not_null, unique]
          - name: store_id
            description: "Assigned home dark store"
            tests: [not_null]

      - name: customers
        description: "Customer profiles and subscription membership"
        columns:
          - name: customer_id
            description: "Primary key for customer"
            tests: [not_null, unique]

      - name: products
        description: "Grocery and daily essentials product catalog"
        columns:
          - name: product_id
            description: "Primary key for product SKU"
            tests: [not_null, unique]

      - name: orders
        description: "Quick-commerce order headers"
        columns:
          - name: order_id
            description: "Primary key for order"
            tests: [not_null, unique]
          - name: customer_id
            description: "Foreign key to customer"
            tests: [not_null]
          - name: store_id
            description: "Fulfilling dark store ID"
            tests: [not_null]

      - name: order_items
        description: "Line items within each order"
        columns:
          - name: order_item_id
            description: "Primary key for line item"
            tests: [not_null, unique]
          - name: order_id
            description: "Foreign key to order"
            tests: [not_null]
          - name: product_id
            description: "Foreign key to product"
            tests: [not_null]

      - name: order_issues
        description: "Same-day order issue resolution and refunds"
        columns:
          - name: issue_id
            description: "Primary key for order issue"
            tests: [not_null, unique]
          - name: order_id
            description: "Foreign key to order"
            tests: [not_null]

      - name: events
        description: "App/Web clickstream user activity"
        columns:
          - name: event_id
            description: "Primary key for event"
            tests: [not_null, unique]

      - name: marketing_spend
        description: "Daily marketing spend across acquisition channels"
        columns:
          - name: spend_id
            description: "Primary key for spend record"
            tests: [not_null, unique]
          - name: date
            description: "Spend date"
            tests: [not_null]
          - name: channel
            description: "Marketing acquisition channel"
            tests: [not_null]